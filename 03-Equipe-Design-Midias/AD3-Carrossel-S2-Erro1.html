<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:1080px; height:1080px; overflow:hidden; background:#FAFAF8; }
  .ad{
    width:1080px; height:1080px; background:#FAFAF8;
    position:relative; overflow:hidden;
    display:flex; flex-direction:column; justify-content:space-between;
    padding:64px 80px 0 100px;
    font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;
  }
  .left-bar{ position:absolute; left:0; top:0; width:7px; height:100%; background:#C41010; }
  .shield-wm{ position:absolute; top:60px; right:60px; opacity:.07; }
  .badge-num{
    font-size:11px; font-weight:800; letter-spacing:.24em;
    text-transform:uppercase; color:#C41010; margin-bottom:14px;
  }
  .divider{ width:52px; height:3px; background:#C41010; margin-bottom:28px; }
  .title{
    font-family:'Playfair Display',serif; font-weight:800;
    font-size:60px; line-height:1.08; color:#1A1A1A;
    letter-spacing:-.5px; max-width:820px; margin-bottom:32px;
  }
  .body-copy{
    font-size:26px; font-weight:300; color:#444444;
    line-height:1.55; max-width:820px;
  }
  .body-copy strong{ font-weight:600; color:#1A1A1A; }
  .footer{
    display:flex; align-items:center; justify-content:space-between;
    background:#111111; padding:24px 80px 24px 100px;
    margin-left:-100px; margin-right:-80px; width:calc(100% + 180px);
  }
  .brand{ font-size:12px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:#C41010; }
  .swipe{ font-size:13px; color:rgba(255,255,255,.3); display:flex; align-items:center; gap:6px; }
</style>
</head>
<body>
<div class="ad">
  <div class="left-bar"></div>
  <div class="shield-wm">
    <svg width="100" height="120" viewBox="0 0 60 72" fill="none">
      <path d="M30 2L4 13V33C4 52 15 65 30 70C45 65 56 52 56 33V13L30 2Z" fill="none" stroke="#C41010" stroke-width="2.5"/>
    </svg>
  </div>

  <div class="content">
    <div class="badge-num">ERRO 1 DE 3</div>
    <div class="divider"></div>
    <h2 class="title">Achar que NR-1<br>é só para<br>empresa grande</h2>
    <p class="body-copy">
      A lei <strong>não tem limite mínimo</strong> de funcionários.<br>
      Se tem um CLT, a obrigação é sua —<br>
      e o fiscal não pergunta o tamanho<br>
      da empresa antes de autuar.
    </p>
  </div>

  <div class="footer">
    <span class="brand">🛡️ Empresa Protegida™</span>
    <span class="swipe" style="color:rgba(255,255,255,.3);">próximo erro →</span>
  </div>
</div>
</body>
</html>
