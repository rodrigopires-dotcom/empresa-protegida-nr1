<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:1080px; height:1080px; overflow:hidden; background:#111111; }
  .ad{
    width:1080px; height:1080px; background:#111111;
    position:relative; overflow:hidden;
    display:flex; flex-direction:column;
    align-items:center; justify-content:space-between;
    padding:56px 80px 52px;
    font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;
  }
  .bar{ position:absolute; left:0; right:0; height:5px; background:#C41010; z-index:10; }
  .bar-top{ top:0; }
  .bar-bottom{ bottom:0; }
  .badge{
    display:inline-flex; align-items:center; gap:9px;
    border:1px solid rgba(196,16,16,.3); border-radius:4px;
    padding:5px 14px;
  }
  .badge-text{ font-size:11px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:#C41010; }
  .center{
    display:flex; flex-direction:column; align-items:center;
    gap:0; text-align:center;
  }
  .num-wm{
    font-size:340px; font-weight:800; color:rgba(196,16,16,.08);
    font-family:'Inter',sans-serif; line-height:1;
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-52%);
    pointer-events:none; z-index:0; letter-spacing:-10px;
    user-select:none;
  }
  .shield{ position:relative; z-index:1; margin-bottom:20px; }
  .title{
    font-family:'Playfair Display',serif; font-weight:800;
    font-size:58px; line-height:1.08; color:#FFFFFF;
    letter-spacing:-.5px; max-width:820px;
    position:relative; z-index:1;
  }
  .title span{ color:#C41010; }
  .sub{
    font-size:22px; font-weight:300;
    color:rgba(255,255,255,.5); margin-top:20px;
    position:relative; z-index:1;
  }
  .footer{
    display:flex; align-items:center; justify-content:space-between;
    width:100%; border-top:1px solid rgba(255,255,255,.08); padding-top:18px;
  }
  .brand{ font-size:12px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:#C41010; }
  .swipe{ font-size:13px; color:rgba(255,255,255,.3); display:flex; align-items:center; gap:6px; }
</style>
</head>
<body>
<div class="ad">
  <div class="bar bar-top"></div>
  <div class="num-wm">3</div>

  <div class="badge">
    <svg width="11" height="13" viewBox="0 0 11 13" fill="none">
      <path d="M5.5 1L1 3V6.5C1 9.5 2.9 12 5.5 12.5C8.1 12 10 9.5 10 6.5V3L5.5 1Z" fill="none" stroke="#C41010" stroke-width="1.1"/>
    </svg>
    <span class="badge-text">Empresa Protegida™</span>
  </div>

  <div class="center">
    <div class="shield">
      <svg width="110" height="132" viewBox="0 0 60 72" fill="none">
        <path d="M30 2L4 13V33C4 52 15 65 30 70C45 65 56 52 56 33V13L30 2Z" fill="#C9A96E"/>
      </svg>
    </div>
    <h1 class="title"><span>3 erros</span> que deixam<br>sua empresa exposta<br>à nova NR-1</h1>
    <p class="sub">Se você tem funcionário CLT, deslize →</p>
  </div>

  <div class="footer">
    <span class="brand">🛡️ Empresa Protegida™</span>
    <span class="swipe">deslize <span style="font-size:18px;">→</span></span>
  </div>
  <div class="bar bar-bottom"></div>
</div>
</body>
</html>
